<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI潮流导购</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="phone" aria-label="AI潮流导购手机页面">
      <header class="app-header">
        <div class="status-row">
          <span>9:41</span>
          <span>正品鉴别 · 搭配参考</span>
        </div>
        <div class="brand-row">
          <div class="brand-mark">AI</div>
          <div>
            <strong>AI潮流导购</strong>
            <span id="stepText">把想法慢慢理顺，陪你找到更合适的单品。</span>
          </div>
        </div>
        <div class="progress" id="progressBar" aria-label="流程进度"></div>
      </header>

      <section class="screen" id="screen" aria-live="polite"></section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
